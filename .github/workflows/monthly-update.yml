name: Monthly AI Cheatsheet Update

on:
  schedule:
    # Runs at 09:00 UTC on the 1st of every month
    - cron: '0 9 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  analyze-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Analyze current content coverage
        uses: actions/github-script@v7
        id: analyze
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Read all MDX/MD content files from Starlight docs
            const docsDir = 'src/content/docs';
            const allText = [];
            const existingFiles = [];

            function walkDir(dir) {
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const fullPath = path.join(dir, entry.name);
                if (entry.isDirectory()) {
                  walkDir(fullPath);
                } else if (entry.name.endsWith('.md') || entry.name.endsWith('.mdx')) {
                  existingFiles.push(fullPath.replace(/\\/g, '/'));
                  allText.push(fs.readFileSync(fullPath, 'utf8').toLowerCase());
                }
              }
            }
            walkDir(docsDir);

            const combinedText = allText.join(' ');

            // Topic checklist for coverage analysis
            const topicChecklist = {
              'Prompt Engineering': [
                'chain-of-thought', 'few-shot', 'zero-shot', 'system prompt',
                'role prompting', 'structured output', 'json mode',
                'prompt chaining', 'meta-prompting', 'self-consistency',
                'tree of thought', 'react prompting', 'reflection',
                'prompt injection defense', 'guardrails', 'output parsing',
              ],
              'Context Engineering': [
                'rag', 'retrieval augmented', 'vector search', 'embedding',
                'context window', 'token limit', 'chunking', 'reranking',
                'semantic search', 'hybrid search', 'knowledge graph',
                'memory management', 'conversation history', 'sliding window',
                'context compression', 'long context',
              ],
              'Agentic AI': [
                'tool use', 'function calling', 'multi-agent', 'orchestration',
                'planning', 'reasoning', 'self-reflection', 'human-in-the-loop',
                'agent loop', 'task decomposition', 'autonomous',
                'mcp', 'model context protocol', 'a2a', 'agent-to-agent',
                'crew ai', 'langgraph', 'autogen', 'swarm',
                'computer use', 'browser use', 'code interpreter',
              ],
              'Models & APIs': [
                'claude', 'gpt-4', 'gpt-4o', 'gemini', 'llama', 'mistral',
                'command r', 'deepseek', 'qwen', 'phi',
                'openai', 'anthropic', 'bedrock', 'vertex ai', 'azure openai',
                'structured outputs', 'streaming', 'batch api',
                'vision', 'multimodal', 'audio', 'video understanding',
              ],
              'Evaluation & Safety': [
                'hallucination', 'evaluation', 'benchmark', 'red teaming',
                'alignment', 'safety', 'responsible ai', 'bias',
                'constitutional ai', 'rlhf', 'dpo',
                'evals', 'automated evaluation', 'human evaluation',
              ],
            };

            const coverage = {};
            const missingTopics = {};
            let totalCovered = 0;
            let totalTopics = 0;

            for (const [category, topics] of Object.entries(topicChecklist)) {
              const found = [];
              const missing = [];
              for (const topic of topics) {
                totalTopics++;
                if (combinedText.includes(topic.toLowerCase())) {
                  found.push(topic);
                  totalCovered++;
                } else {
                  missing.push(topic);
                }
              }
              coverage[category] = {
                covered: found.length,
                total: topics.length,
                percent: Math.round((found.length / topics.length) * 100),
              };
              if (missing.length > 0) {
                missingTopics[category] = missing;
              }
            }

            const result = {
              fileCount: existingFiles.length,
              coveragePercent: Math.round((totalCovered / totalTopics) * 100),
              coverage,
              missingTopics,
              existingFiles,
            };

            core.setOutput('analysis', JSON.stringify(result));
            console.log('=== Coverage Analysis ===');
            console.log(JSON.stringify(result, null, 2));

      - name: Generate content update
        uses: actions/github-script@v7
        id: generate
        with:
          script: |
            const analysis = JSON.parse(`${{ steps.analyze.outputs.analysis }}`);

            // GUARDRAIL: Skip if coverage is already high
            if (analysis.coveragePercent >= 90) {
              console.log('Coverage is ' + analysis.coveragePercent + '%. No update needed.');
              core.setOutput('has_updates', 'false');
              return;
            }

            // Pick the category with worst coverage
            let worstCategory = null;
            let worstPercent = 100;
            for (const [cat, info] of Object.entries(analysis.coverage)) {
              if (info.percent < worstPercent) {
                worstPercent = info.percent;
                worstCategory = cat;
              }
            }

            if (!worstCategory || !analysis.missingTopics[worstCategory]) {
              core.setOutput('has_updates', 'false');
              return;
            }

            // GUARDRAIL: Only add up to 3 new topics per month
            const missingInWorst = analysis.missingTopics[worstCategory].slice(0, 3);

            // Map categories to Starlight doc directories
            const categoryDirMap = {
              'Prompt Engineering': 'prompt-engineering',
              'Context Engineering': 'context-engineering',
              'Agentic AI': 'agentic-ai',
              'Models & APIs': 'guides',
              'Evaluation & Safety': 'guides',
            };

            const dir = categoryDirMap[worstCategory] || 'guides';

            // Generate safe MDX content — template-only, no AI generation
            // GUARDRAIL: Never use AI to auto-generate content that gets committed
            const topicEntries = missingInWorst.map(topic => {
              const slug = topic.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
              const title = topic.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
              return { slug, title, topic };
            });

            core.setOutput('has_updates', 'true');
            core.setOutput('category', worstCategory);
            core.setOutput('dir', dir);
            core.setOutput('topics', JSON.stringify(topicEntries));
            core.setOutput('topic_names', missingInWorst.join(', '));
            console.log('Will create stub pages for:', missingInWorst);

      - name: Create stub MDX pages
        if: steps.generate.outputs.has_updates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = '${{ steps.generate.outputs.dir }}';
            const topics = JSON.parse('${{ steps.generate.outputs.topics }}');

            // GUARDRAIL: Never create more than 3 files per run
            const maxFiles = 3;
            const toCreate = topics.slice(0, maxFiles);

            for (const { slug, title } of toCreate) {
              const filePath = path.join('src/content/docs', dir, `${slug}.md`);

              // GUARDRAIL: Never overwrite existing files
              if (fs.existsSync(filePath)) {
                console.log(`Skipping ${filePath} — already exists`);
                continue;
              }

              // GUARDRAIL: Only create minimal stub with TODO marker
              const content = [
                '---',
                `title: "${title}"`,
                `description: "TODO: Add description for ${title}"`,
                '---',
                '',
                `## ${title}`,
                '',
                `> **TODO**: This is a stub page created by the monthly update workflow.`,
                `> Please review and fill in the content manually.`,
                '',
                `<!-- Auto-generated stub: ${new Date().toISOString().slice(0, 10)} -->`,
                '',
              ].join('\n');

              fs.writeFileSync(filePath, content);
              console.log(`Created stub: ${filePath}`);
            }

      # GUARDRAIL: Verify the build still passes before creating PR
      - name: Verify build
        if: steps.generate.outputs.has_updates == 'true'
        run: npm run build

      - name: Create Pull Request
        if: steps.generate.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'content(stub): add ${{ steps.generate.outputs.topic_names }}'
          title: '📝 Monthly Stub — ${{ steps.generate.outputs.category }}'
          body: |
            ## Monthly Coverage Analysis

            **Category with lowest coverage:** ${{ steps.generate.outputs.category }}
            **Stub pages created for:** ${{ steps.generate.outputs.topic_names }}

            ### What this PR does
            Creates **stub pages** (not full content) for missing topics detected
            by the monthly coverage analysis.

            ### ⚠️ Action required
            - [ ] Review each stub page and fill in real content
            - [ ] Check that the sidebar in `astro.config.mjs` includes new pages
            - [ ] Verify content accuracy before merging

            ### Guardrails applied
            - ✅ Max 3 new stubs per month
            - ✅ No AI-generated content committed (stubs only)
            - ✅ Never overwrites existing files
            - ✅ Build verified before PR creation
            - ✅ Sidebar config NOT auto-modified (manual review required)

            ---
            *Auto-generated by monthly analysis. Human review required before merge.*
          branch: auto-update/monthly-stubs
          delete-branch: true
          labels: automated,content-stub,needs-review
